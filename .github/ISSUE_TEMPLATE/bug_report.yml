name: Hata bildirimi
description: VORMETRA profili, Vera veya VORMETRA Slice hatası bildirin
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Bu form VORMETRA'ya özgü sorunlar içindir. Değişiklik yapılmamış
        OrcaSlicer'da da oluşan sorunları mümkünse upstream'e bildirin.
        Güvenlik açıkları için issue açmayın; özel güvenlik bildirimini kullanın.
  - type: checkboxes
    attributes:
      label: Ön kontrol
      options:
        - label: Mevcut açık ve kapalı issue'larda aynı sorunu aradım.
          required: true
        - label: Rapordan erişim anahtarlarını ve özel verileri çıkardım.
          required: true
  - type: dropdown
    id: component
    attributes:
      label: Bileşen
      options:
        - G1000 makine veya proses profili
        - Pellet malzeme profili
        - vera-control HTTP API
        - vera-control MCP sunucusu
        - Vera Console
        - Native VORMETRA Slice uygulaması
        - Emin değilim
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Sürüm veya commit
      description: Release adı yoksa git commit hash'ini yazın.
      placeholder: Örn. 8da9525
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: İşletim sistemi
      multiple: true
      options:
        - Windows
        - macOS
        - Linux
        - Uygulanamaz
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Yeniden üretme adımları
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Gerçek sonuç
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Beklenen sonuç
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Redakte edilmiş log veya örnek dosya
      description: Gerekliyse log, ekran görüntüsü veya minimal proje ekleyin; özel verileri çıkarın.
    validations:
      required: false
