name: Özellik önerisi
description: VORMETRA profili veya Vera için geliştirme önerin
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Tüm OrcaSlicer kullanıcılarını ilgilendiren genel motor özelliklerini
        mümkünse OrcaSlicer upstream'e önerin.
  - type: checkboxes
    attributes:
      label: Ön kontrol
      options:
        - label: Mevcut issue ve dokümantasyonda benzer bir öneri aradım.
          required: true
  - type: dropdown
    id: component
    attributes:
      label: Bileşen
      options:
        - G1000 profilleri
        - Pellet/FGF dilimleme davranışı
        - vera-control API veya MCP
        - Vera Console
        - Native VORMETRA Slice uygulaması
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Çözülecek problem
      description: Özellikten önce mevcut problemi ve kullanıcı etkisini açıklayın.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Önerilen çözüm
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Değerlendirilen alternatifler
    validations:
      required: false
  - type: textarea
    id: data
    attributes:
      label: Gerekli makine verisi veya kaynak
      description: G1000 sayısal değeri gerekiyorsa doğrulanabilir kaynağını yazın; bilinmiyorsa TBD belirtin.
    validations:
      required: false
